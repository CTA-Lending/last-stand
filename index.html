<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>誰撐最久 · Last Stand</title>
<style>
  body { margin:0; background:#1c2230; color:#eee; font-family:system-ui,sans-serif;
         display:flex; flex-direction:column; align-items:center; }
  #topbar { display:flex; gap:18px; padding:10px; font-size:15px; }
  #topbar b { color:#ffe08a; }
  #stage { position:relative; }
  canvas { display:block; background:#cfe3c4; border-radius:8px; cursor:pointer; }
  #buildbar { display:flex; gap:8px; padding:10px; }
  .build-btn { background:#2b3346; color:#eee; border:1px solid #3d4760; border-radius:8px;
               padding:6px 10px; cursor:pointer; font-size:13px; text-align:center; }
  .build-btn.active { border-color:#ffe08a; background:#3a3320; }
  .build-btn.locked { opacity:.45; cursor:not-allowed; background:#23262e; }
  .build-btn.locked .req { color:#c98a8a; }
  #spellbar { display:flex; gap:8px; padding:0 10px 10px; }
  .spell-btn { background:#3a2b4a; color:#eee; border:1px solid #5a4670; border-radius:8px;
               padding:8px 14px; cursor:pointer; font-size:14px; }
  .spell-btn.cooling { opacity:.45; cursor:default; }
  .spell-btn.armed { border-color:#ffe08a; background:#4a3320; }
  #towerpanel { position:absolute; top:8px; right:8px; background:rgba(20,24,34,.92);
                padding:10px; border-radius:8px; font-size:13px; display:none; }
  #towerpanel button { display:block; margin-top:6px; width:100%; cursor:pointer; }
  .branch-row { display:flex; gap:6px; }
  .branch-row button { flex:1; font-size:12px; }
  #overlay { position:absolute; inset:0; background:rgba(0,0,0,.6); display:none;
             align-items:center; justify-content:center; }
  .panel { background:#222a3a; padding:30px 40px; border-radius:12px; text-align:center; }
  .panel button { margin-top:14px; padding:10px 24px; font-size:16px; cursor:pointer;
                  background:#7f77dd; color:#fff; border:none; border-radius:8px; }
  .best { color:#ffe08a; }
  #mapbar button, #modebar button { margin-left:6px; font-size:12px; padding:2px 8px; cursor:pointer;
                   background:#2b3346; color:#eee; border:1px solid #3d4760; border-radius:6px; }
  #mapbar button.active, #modebar button.active { border-color:#ffe08a; }
  #gachabtn button { margin-left:10px; font-size:13px; padding:3px 10px; cursor:pointer;
                     background:#4a3320; color:#ffe08a; border:1px solid #ffe08a; border-radius:6px; }
  #dexbtn button { margin-left:8px; font-size:13px; padding:3px 10px; cursor:pointer;
                   background:#2b3346; color:#bfe9ff; border:1px solid #3d4760; border-radius:6px; }
  #dexoverlay { position:absolute; inset:0; background:rgba(0,0,0,.8); display:none;
                align-items:center; justify-content:center; overflow:auto; }
  .dex-panel { background:#1f2632; padding:20px 24px; border-radius:14px; max-width:760px; max-height:92%; overflow:auto; }
  .dex-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:12px; }
  .dex-card { background:#2a3340; border-radius:10px; padding:12px; font-size:12px; }
  .dex-card.locked { opacity:.5; }
  .dex-card h4 { margin:4px 0; font-size:14px; }
  .dex-role { color:#9fb0c0; }
  .dex-lore { color:#cbd4dd; margin-top:6px; line-height:1.5; }
  .dex-close { display:block; margin:16px auto 0; background:none; border:none; color:#aaa; cursor:pointer; }
  #gachaoverlay { position:absolute; inset:0; background:rgba(0,0,0,.7); display:none;
                  align-items:center; justify-content:center; }
  .gacha-panel { background:#222a3a; padding:28px 36px; border-radius:14px; text-align:center; min-width:300px; }
  .gacha-panel h2 { margin:0 0 8px; }
  .gacha-card { margin:16px auto; padding:18px; border-radius:12px; width:200px; }
  .gacha-roll { margin-top:10px; padding:10px 26px; font-size:16px; cursor:pointer; border:none;
                border-radius:8px; background:#7f77dd; color:#fff; }
  .gacha-roll:disabled { opacity:.5; cursor:default; }
  .gacha-close { display:block; margin:14px auto 0; background:none; border:none; color:#aaa; cursor:pointer; }
  #lbbtn button { margin-left:8px; font-size:13px; padding:3px 10px; cursor:pointer;
                  background:#2b3346; color:#ffd973; border:1px solid #3d4760; border-radius:6px; }
  #lboverlay { position:absolute; inset:0; background:rgba(0,0,0,.82); display:none;
               align-items:center; justify-content:center; }
  .lb-panel { background:#1f2632; padding:22px 26px; border-radius:14px; min-width:380px; max-height:90%; overflow:auto; }
  .lb-row { display:flex; justify-content:space-between; padding:7px 10px; border-radius:6px; font-size:14px; }
  .lb-row.you { background:#3a3320; color:#ffe08a; font-weight:bold; }
  .lb-rank { width:36px; color:#9fb0c0; }
  .lb-name { flex:1; }
  .lb-sub { color:#9fb0c0; font-size:12px; margin:14px 0 6px; }
  .lb-close { display:block; margin:16px auto 0; background:none; border:none; color:#aaa; cursor:pointer; }
  .lb-note { color:#6f7d8c; font-size:11px; text-align:center; margin-top:10px; }
</style>
</head>
<body>
  <div id="topbar">
    <span>💰<b id="hud-gold">0</b></span>
    <span>❤️<b id="hud-lives">0</b></span>
    <span>🌊 第<b id="hud-wave">0</b>波</span>
    <span>⭐<b id="hud-score">0</b></span>
    <span>⏱️<b id="hud-time">0s</b></span>
    <span id="hud-next" style="color:#ffe08a;font-weight:bold;"></span>
    <span id="mapbar"></span>
    <span id="modebar"></span>
    <span id="gachabtn"></span>
    <span id="dexbtn"></span>
    <span id="lbbtn"></span>
  </div>
  <div id="stage">
    <canvas id="game" width="800" height="480"></canvas>
    <div id="towerpanel"></div>
    <div id="overlay"></div>
    <div id="gachaoverlay"></div>
    <div id="dexoverlay"></div>
    <div id="lboverlay"></div>
  </div>
  <div id="buildbar"></div>
  <div id="spellbar"></div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
